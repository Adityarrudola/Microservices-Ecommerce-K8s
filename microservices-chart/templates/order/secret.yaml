apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.order.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DB_HOST: {{ .Values.order.env.DB_HOST }}
  DB_NAME: {{ .Values.order.env.DB_NAME }}
  DB_USER: {{ .Values.order.env.DB_USER }}
  DB_PASS: {{ .Values.order.env.DB_PASS }}

  USER_SERVICE_URL: {{ .Values.order.env.USER_SERVICE_URL }}
  PRODUCT_SERVICE_URL: {{ .Values.order.env.PRODUCT_SERVICE_URL }}