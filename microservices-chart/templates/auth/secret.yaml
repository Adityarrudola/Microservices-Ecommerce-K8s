apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DB_HOST: {{ .Values.auth.env.DB_HOST }}
  DB_NAME: {{ .Values.auth.env.DB_NAME }}
  DB_USER: {{ .Values.auth.env.DB_USER }}
  DB_PASS: {{ .Values.auth.env.DB_PASS }}
  SECRET_KEY: {{ .Values.auth.env.SECRET_KEY }}
  USER_SERVICE_URL: {{ .Values.auth.env.USER_SERVICE_URL }}